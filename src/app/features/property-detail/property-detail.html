<div *ngIf="property" class="detail-container">

  <!-- IMAGE -->
  <div class="image-section">
    <img [src]="property.image" alt="property">
  </div>

  <!-- INFO -->
  <div class="info-section">

    <h2>{{ property.title }}</h2>

    <p class="location">{{ property.location }}</p>

    <p class="price">
      ₹ {{ property.price | number:'1.0-0':'en-IN' }}
    </p>

    <p class="desc">
      {{ property.description }}
    </p>

    <!-- FEATURES -->
    <div class="features">
      <span>{{ property.bhk }}</span>
      <span>{{ property.area }}</span>
    </div>

    <!-- CTA -->
    <button class="cta-btn" (click)="startInquiry()">
      Start Negotiation
    </button>

  </div>

</div>
